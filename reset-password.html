<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally - Reset Password</title>
    <style>
        :root {
            --bg: #0A0E27;
            --surface: #121630;
            --text: #E8ECF4;
            --muted: #9CA3AF;
            --primary: #00D4FF;
            --border: rgba(255,255,255,0.08);
            --error: #EF4444;
            --success: #10B981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1E63D6, #34C759);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: var(--primary);
        }
        .field + .field {
            margin-top: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #1E63D6, #34C759);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        .hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #FFFFFF;
                --surface: #F3F4F6;
                --text: #111827;
                --muted: #6B7280;
                --border: rgba(0,0,0,0.08);
            }
            input {
                background: white;
                border-color: rgba(0,0,0,0.15);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tally</h1>
        <p class="subtitle">Reset your password</p>

        <div class="card">
            <div class="field">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" />
            </div>
            <div class="field">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" placeholder="Type it again" />
            </div>
            <p class="hint">Password must be at least 6 characters.</p>

            <button class="btn" id="resetBtn" onclick="resetPassword()">Update Password</button>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://fxbtbgwbniidtalnoaad.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4YnRiZ3dibmlpZHRhbG5vYWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjc2NzksImV4cCI6MjA4NzcwMzY3OX0.qL7cfIvdR-CGmPzpyDeVNUN_BUZFhNsiRlHzD-FpeSE';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('resetBtn');

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const { error } = await supabase.auth.updateUser({ password });
                if (error) throw error;
                showMessage('Password updated! You can now sign in with your new password in the Tally app.', 'success');
                btn.textContent = 'Done';
            } catch (err) {
                showMessage(err.message || 'Something went wrong. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
