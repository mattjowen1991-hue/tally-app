<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e27">
  <title>Tally</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #121630;
      --bg-card: rgba(25, 31, 61, 0.6);
      --accent-primary: #00d4ff;
      --accent-secondary: #7c3aed;
      --accent-tertiary: #f59e0b;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.03);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 90%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
      animation: backgroundPulse 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes backgroundPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }
    
    #root {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
    }
    
    /* Glass morphism utilities */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 12px 48px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
    }
    
    /* Typography */
    .font-display {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    
    /* Animations */
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }
      100% {
        background-position: 1000px 0;
      }
    }
    
    .animate-in {
      animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    /* Button styles */
    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
    }
    
    .btn-secondary {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }
    
    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }
    
    /* Input styles */
    .input {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      width: 100%;
    }
    
    .input:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .input.input-error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }
    .input.input-error:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }
    
    .input::placeholder {
      color: var(--text-muted);
    }
    
    /* Stat card */
    .stat-card {
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .stat-card:hover::before {
      opacity: 1;
    }
    
    /* Chart container */
    .chart-container {
      position: relative;
      height: 250px;
      margin: 20px 0;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn 0.2s;
    }

    body.modal-open {
  overflow: hidden;
  position: fixed;
  width: 100%;
}
    
    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 24px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: slideInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding-bottom: 0;
      }
      
      .glass-card {
        border-radius: 16px;
      }
      
      .btn {
        padding: 12px 24px;
        font-size: 14px;
        min-height: 44px; /* iOS touch target */
      }
      
      .btn-icon {
        width: 44px;
        height: 44px;
        min-width: 44px;
        min-height: 44px;
      }
      
      /* Make stat cards stack on mobile */
      .stats-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }
      
      /* Mobile table becomes cards */
      .mobile-bill-card {
        background: var(--bg-card);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 12px;
        transition: all 0.3s;
      }
      
      .mobile-bill-card:active {
        transform: scale(0.98);
        background: rgba(255, 255, 255, 0.05);
      }
      
      /* Hide desktop table on mobile */
      .desktop-table {
        display: none;
      }
      
      /* Mobile-specific layouts */
      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--bg-primary);
        padding: 16px 20px;
        margin: -20px -20px 20px -20px;
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
      }
      
      .mobile-quick-stats {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 8px 0;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      
      .mobile-quick-stats::-webkit-scrollbar {
        display: none;
      }
      
      .mobile-stat-pill {
        flex-shrink: 0;
        padding: 8px 16px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 13px;
        white-space: nowrap;
      }
      
      /* Category filters as horizontal scroll */
      .mobile-category-scroll {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        margin-bottom: 16px;
      }
      
      .mobile-category-scroll::-webkit-scrollbar {
        display: none;
      }
      
      /* Collapsible sections */
      .mobile-section {
        margin-bottom: 16px;
      }
      
      .mobile-section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        margin-bottom: 8px;
        transition: all 0.2s;
      }
      
      .mobile-section-header:active {
        background: rgba(255, 255, 255, 0.05);
        transform: scale(0.98);
      }
      
      /* Chart on mobile */
      .chart-container {
        height: 200px;
      }
      
      /* Modal full screen on mobile */
      .modal-content {
        max-width: 100%;
        max-height: 100vh;
        margin: 0;
        border-radius: 24px 24px 0 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
      }
      
      /* Input improvements */
      .input {
        font-size: 16px; /* Prevents iOS zoom */
        min-height: 44px;
      }

      input[type="date"] {
  max-width: 100%;
  min-width: 0;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  position: relative;
  z-index: 10;
  cursor: pointer;
  color: transparent;
}

input[type="date"]::-webkit-datetime-edit {
  display: none;
}

input[type="date"]::-webkit-calendar-picker-indicator {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}

input[type="date"]::before {
  content: 'Select date...';
  color: var(--text-muted);
  pointer-events: none;
}

input[type="date"].has-value::before {
  content: none;
}

input[type="date"].has-value {
  color: var(--text-primary);
}

.modal-content {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 200px;
}
      
      /* Better spacing */
      .mobile-spacing {
        padding: 12px 20px;
      }
      
      /* Font size adjustments */
      h1 {
        font-size: 32px !important;
      }
      
      h2 {
        font-size: 20px !important;
      }
      
      /* Grid adjustments */
      .two-col-mobile {
        grid-template-columns: 1fr !important;
      }
    }
    
    /* Small mobile (iPhone SE, etc.) */
    @media (max-width: 375px) {
      .stats-grid {
        grid-template-columns: 1fr !important;
      }
      
      .btn {
        padding: 10px 16px;
        font-size: 13px;
      }
      
      h1 {
        font-size: 28px !important;
      }
    }
    
    /* Landscape mobile */
    @media (max-width: 768px) and (orientation: landscape) {
      .mobile-header {
        position: relative;
        margin: 0 0 20px 0;
      }
      
      .stats-grid {
        grid-template-columns: repeat(4, 1fr) !important;
      }
    }

    /* Swipe Navigation */
    .swipe-container {
      overflow: hidden;
      position: relative;
      touch-action: pan-y;
      flex: 1;
    }
    .swipe-track {
      display: flex;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      align-items: flex-start;
    }
    .swipe-track.swiping {
      transition: none;
    }
    .swipe-panel {
      min-width: 100%;
      width: 100%;
      flex-shrink: 0;
      padding: 0 4px;
    }
    .swipe-panel:not(.panel-active) {
      height: 0;
      overflow: hidden;
    }
    .swipe-panel.panel-active {
      height: auto;
    }
    .nav-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 12px 0 16px;
    }
    .nav-dot-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }
    .nav-dot-item.active .nav-dot {
      width: 24px;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    }
    .nav-dot-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: all 0.3s;
    }
    .nav-dot-item.active .nav-dot-label {
      color: var(--accent-primary);
    }

    /* Splash screen */
    .splash-screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--bg-primary);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .splash-screen.active {
      opacity: 1;
    }
    .splash-screen.fade-out {
      opacity: 0;
    }

    .splash-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .splash-screen.active .splash-stack {
      animation: splashSettle 120ms ease-out forwards;
      animation-delay: 1680ms;
    }

    @keyframes splashSettle {
      0%   { transform: scale(1); }
      60%  { transform: scale(1.025); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div class="splash-screen" id="splash">
    <div class="splash-stack">
      <svg class="splash-logo" width="120" height="120" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-label="Tally logo" role="img">
        <defs>
          <linearGradient id="splashGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1E63D6" />
            <stop offset="100%" stop-color="#34C759" />
          </linearGradient>
        </defs>
        <g transform="rotate(-4 69 130)">
          <rect x="58" y="52" width="22" height="0" rx="14" fill="url(#splashGrad)">
            <animate attributeName="height" values="0;156" dur="0.24s" begin="indefinite" fill="freeze" calcMode="spline" keySplines="0.22 0.9 0.25 1" class="anim-bar1"/>
          </rect>
        </g>
        <g transform="rotate(2 107 128)">
          <rect x="94" y="48" width="26" height="0" rx="14" fill="url(#splashGrad)">
            <animate attributeName="height" values="0;160" dur="0.24s" begin="indefinite" fill="freeze" calcMode="spline" keySplines="0.22 0.9 0.25 1" class="anim-bar2"/>
          </rect>
        </g>
        <g transform="rotate(-2 143.5 129)">
          <rect x="132" y="54" width="23" height="0" rx="14" fill="url(#splashGrad)">
            <animate attributeName="height" values="0;150" dur="0.24s" begin="indefinite" fill="freeze" calcMode="spline" keySplines="0.22 0.9 0.25 1" class="anim-bar3"/>
          </rect>
        </g>
        <g transform="rotate(3 180.5 129)">
          <rect x="168" y="50" width="25" height="0" rx="14" fill="url(#splashGrad)">
            <animate attributeName="height" values="0;158" dur="0.24s" begin="indefinite" fill="freeze" calcMode="spline" keySplines="0.22 0.9 0.25 1" class="anim-bar4"/>
          </rect>
        </g>
        <path d="M38 170 Q128 120 220 92" fill="none" stroke="url(#splashGrad)" stroke-width="20" stroke-linecap="round" stroke-dasharray="420" stroke-dashoffset="420">
          <animate attributeName="stroke-dashoffset" values="420;0" dur="0.42s" begin="indefinite" fill="freeze" calcMode="spline" keySplines="0.22 0.9 0.25 1" class="anim-strike"/>
        </path>
      </svg>

      <svg class="splash-text" width="280" height="90" viewBox="0 0 520 170" xmlns="http://www.w3.org/2000/svg" aria-label="Tally" role="img" style="margin-top:14px;">
        <defs>
          <linearGradient id="splashWordGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2F6BFF" />
            <stop offset="55%" stop-color="#22C3A6" />
            <stop offset="100%" stop-color="#7AD957" />
          </linearGradient>
          <mask id="wordRevealDiag">
            <rect x="-300" y="-260" width="0" height="520" fill="#fff" transform="rotate(-12 260 85)">
              <animate attributeName="width" values="0;1100" dur="0.52s" begin="indefinite" fill="freeze" calcMode="spline" keySplines="0.22 0.9 0.25 1" class="anim-reveal"/>
            </rect>
          </mask>
        </defs>
        <g mask="url(#wordRevealDiag)">
          <text x="260" y="118" text-anchor="middle" fill="url(#splashWordGrad)" font-size="110" font-weight="800" letter-spacing="-6" font-family="ui-rounded, 'SF Pro Rounded', Nunito, Quicksand, 'Avenir Next Rounded', 'Segoe UI', system-ui, -apple-system, Arial" transform="skewX(-6)">
            <tspan>T</tspan><tspan dx="-16" dy="4">a</tspan><tspan dy="-3">l</tspan><tspan dy="5">l</tspan><tspan dy="-4">y</tspan>
          </text>
        </g>
        <g mask="url(#wordRevealDiag)">
          <text x="260" y="118" text-anchor="middle" fill="url(#splashWordGrad)" fill-opacity="0" font-size="110" font-weight="800" letter-spacing="-6" font-family="ui-rounded, 'SF Pro Rounded', Nunito, Quicksand, 'Avenir Next Rounded', 'Segoe UI', system-ui, -apple-system, Arial" transform="skewX(-6)">
            <tspan>T</tspan><tspan dx="-16" dy="4">a</tspan><tspan dy="-3">l</tspan><tspan dy="5">l</tspan><tspan dy="-4">y</tspan>
            <animate attributeName="fill-opacity" values="0;1" dur="0.22s" begin="indefinite" fill="freeze" class="anim-fade"/>
          </text>
        </g>
      </svg>
    </div>
  </div>

  <script type="text/babel">
    // Capacitor Storage shim - bridges window.storage to Capacitor Preferences
(function() {
  if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences) {
    const Prefs = window.Capacitor.Plugins.Preferences;
    window.storage = {
      get: async (key) => {
        const result = await Prefs.get({ key });
        return result.value ? { value: result.value } : null;
      },
      set: async (key, value) => {
        await Prefs.set({ key, value });
        return { key, value };
      },
      delete: async (key) => {
        await Prefs.remove({ key });
        return { key, deleted: true };
      }
    };
  } else if (!window.storage) {
    // Fallback for browser testing
    window.storage = {
      get: async (key) => {
        const v = localStorage.getItem(key);
        return v ? { value: v } : null;
      },
      set: async (key, value) => {
        localStorage.setItem(key, value);
        return { key, value };
      },
      delete: async (key) => {
        localStorage.removeItem(key);
        return { key, deleted: true };
      }
    };
  }
})();
// Dismiss native splash, then trigger animated splash
(async function() {
  try {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
      await window.Capacitor.Plugins.SplashScreen.hide();
    }
  } catch(e) {}

  const splash = document.getElementById('splash');
  splash.classList.add('active');

  // Kick off SMIL animations with staggered timing
  const start = (sel, delay) => setTimeout(() => {
    const el = document.querySelector(sel);

    const shouldAutoPay = (bill) => {
  if (!bill.recurring || bill.missed || bill.paused) return false;
  
  const now = new Date();
  const today = now.getDate();
  const currentDay = now.getDay();
  const currentMonth = now.getMonth() + 1;
  
  switch (bill.frequency || 'Monthly') {
    case 'Weekly':
      return currentDay === parseInt(bill.paymentDay);
      
    case 'Fortnightly': {
      if (!bill.startDate) return false;
      const start = new Date(bill.startDate);
      const diffDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      const diffWeeks = Math.floor(diffDays / 7);
      return diffWeeks % 2 === 0 && currentDay === parseInt(bill.paymentDay);
    }
    
    case 'Monthly':
      return today >= parseInt(bill.paymentDate);
      
    case 'Quarterly': {
      const startMonth = parseInt(bill.startMonth) || 1;
      const payMonths = [startMonth, startMonth + 3, startMonth + 6, startMonth + 9]
        .map(m => ((m - 1) % 12) + 1);
      return payMonths.includes(currentMonth) && today >= parseInt(bill.paymentDate);
    }
    
    case 'Yearly': {
      const yearlyDate = new Date(bill.paymentDate);
      return currentMonth === (yearlyDate.getMonth() + 1) && today >= yearlyDate.getDate();
    }
    
    default:
      return false;
  }
};

                    </div>
                  </div>

                  <div style={{ marginBottom: '16px' }}>
                    <div style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px', fontWeight: '500' }}>DEFAULT CATEGORIES</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                      {defaultCategories.map(cat => {
                        const count = bills.filter(b => b.category === cat).length;
                        return (
                          <div key={cat} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', background: 'var(--glass)', borderRadius: '12px', border: '1px solid var(--border)' }}>
                            <div>
                              <span style={{ fontWeight: '500', fontSize: '14px' }}>{cat}</span>
                              <span style={{ fontSize: '12px', color: 'var(--text-muted)', marginLeft: '8px' }}>{count} bills</span>
                            </div>
                            <span style={{ fontSize: '11px', color: 'var(--text-muted)', padding: '3px 8px', background: 'var(--glass)', borderRadius: '6px' }}>Default</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {customCategories.length > 0 && (
                    <div style={{ marginBottom: '16px' }}>
                      <div style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px', fontWeight: '500' }}>CUSTOM CATEGORIES</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                        {customCategories.map(cat => {
                          const count = bills.filter(b => b.category === cat).length;
                          return (
                            <div key={cat} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', background: 'var(--glass)', borderRadius: '12px', border: '1px solid var(--border)' }}>
                              <div>
                                <span style={{ fontWeight: '500', fontSize: '14px' }}>{cat}</span>
                                <span style={{ fontSize: '12px', color: 'var(--text-muted)', marginLeft: '8px' }}>{count} bills</span>
                              </div>
                              <button 
                                onClick={() => handleDeleteCategory(cat)}
                                style={{ background: 'none', border: 'none', cursor: 'pointer', color: count > 0 ? 'var(--text-muted)' : '#ef4444', padding: '4px', opacity: count > 0 ? 0.5 : 1 }}
                              >
                                <Icons.Trash size={16} />
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  <button 
                    className="btn btn-secondary" 
                    onClick={() => setShowCategoryModal(false)}
                    style={{ width: '100%', justifyContent: 'center', marginTop: '8px' }}
                  >
                    Done
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Add Debt Modal */}
          {showAddDebtModal && (
            <div className="modal-overlay" onClick={() => {
  setShowAddDebtModal(false);
  setValidationErrors({});
  setNewDebt({
    name: '',
    type: 'Credit Card',
    totalAmount: '',
    originalAmount: '',
    startDate: '',
    endDate: '',
    recurringPayment: ''
  });
}}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div style={{ padding: isMobile ? '16px' : '32px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: isMobile ? '24px' : '32px' }}>
<h2 className="font-display" style={{ fontSize: isMobile ? '24px' : '28px' }}>Add New Debt</h2>
                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                    <div>
                      <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                        Debt Name *
                      </label>
                      <input
                        className={`input ${validationErrors['debt-name'] ? 'input-error' : ''}`}
                        placeholder="e.g., Credit Card, Student Loan"
                        value={newDebt.name}
                        onChange={(e) => { setNewDebt({ ...newDebt, name: e.target.value }); setValidationErrors(v => { const n = {...v}; delete n['debt-name']; return n; }); }}
                      />
                    </div>

                    <div>
                      <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                        Debt Type *
                      </label>
                      <select
                        className="input"
                        value={newDebt.type}
                        onChange={(e) => setNewDebt({ ...newDebt, type: e.target.value })}
                      >
                        {debtTypes.map(type => (
                          <option key={type} value={type}>{type}</option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                        Current Balance *
                      </label>
                      <input
                        type="number"
                        className={`input ${validationErrors['debt-balance'] ? 'input-error' : ''}`}
                        placeholder="What you owe right now"
                        value={newDebt.totalAmount}
                        onChange={(e) => { setNewDebt({ ...newDebt, totalAmount: e.target.value === '' ? '' : parseFloat(e.target.value) || 0 }); setValidationErrors(v => { const n = {...v}; delete n['debt-balance']; return n; }); }}
                      />
                    </div>

                    <div style={{ padding: isMobile ? '12px' : '16px', background: 'var(--glass)', borderRadius: '12px', border: '1px solid var(--border)', overflow: 'hidden' }}>
                      <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '12px', color: 'var(--text-secondary)' }}>
                        Optional Details
                      </div>
                      
                      <div style={{ marginBottom: '16px' }}>
                        <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                          Original Amount
                        </label>
                        <input
                          type="number"
                          className="input"
                          placeholder="What you originally borrowed"
                          value={newDebt.originalAmount || ''}
                          onChange={(e) => setNewDebt({ ...newDebt, originalAmount: e.target.value === '' ? '' : parseFloat(e.target.value) || 0 })}
                        />
                      </div>
                      
                      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: isMobile ? '8px' : '16px', marginBottom: '16px' }}>
                        <div>
                          <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                            Start Date
                          </label>
                          <input
  type="date" onKeyDown={(e) => e.preventDefault()}
  className="input"
  value={newDebt.startDate}
  onChange={(e) => setNewDebt({ ...newDebt, startDate: e.target.value })}
/>
                        </div>

                        <div>
                          <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                            End Date
                          </label>
                          <input
  type="date" onKeyDown={(e) => e.preventDefault()}
  className="input"
  value={newDebt.endDate}
  onChange={(e) => setNewDebt({ ...newDebt, endDate: e.target.value })}
/>
                        </div>
                      </div>

                      <div>
                        <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>
                          Recurring Payment
                        </label>
                        <input
                          type="number"
                          className="input"
                          placeholder="Monthly payment amount"
                          value={newDebt.recurringPayment}
                        onChange={(e) => setNewDebt({ ...newDebt, recurringPayment: e.target.value === '' ? '' : parseFloat(e.target.value) || 0 })}
                        />
                      </div>
                    </div>

                    <div style={{ display: 'flex', gap: '12px', marginTop: '8px' }}>
  <button 
    className="btn btn-primary" 
    onClick={handleAddDebt}
    style={{ flex: 1, justifyContent: 'center' }}
  >
    <Icons.Plus size={20} />
    Add Debt
  </button>
  <button 
    className="btn btn-secondary" 
    onClick={() => {
      setShowAddDebtModal(false);
      setValidationErrors({});
      setNewDebt({
        name: '',
        type: 'Credit Card',
        totalAmount: '',
        originalAmount: '',
        startDate: '',
        endDate: '',
        recurringPayment: ''
      });
    }}
    style={{ flex: 1, justifyContent: 'center' }}
  >
    Cancel
  </button>
</div>
                  </div>
                </div>
              </div>
            </div>
          )}
          {/* Add Savings Modal */}
          {showAddSavingsModal && (
            <div className="modal-overlay" onClick={() => {
  setShowAddSavingsModal(false);
  setValidationErrors({});
  setNewSavings({ name: '', category: 'Emergency', targetAmount: '', currentAmount: '', monthlyContribution: '', priority: '', startDate: '' });
}}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div style={{ padding: isMobile ? '16px' : '32px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: isMobile ? '24px' : '32px' }}>
                    <h2 className="font-display" style={{ fontSize: isMobile ? '24px' : '28px' }}>Add Savings Goal</h2>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                    <div>
                      <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>Goal Name *</label>
                      <input
                        className={`input ${validationErrors['savings-name'] ? 'input-error' : ''}`}
                        placeholder="e.g., Holiday Fund, Emergency Savings"
                        value={newSavings.name}
                        onChange={(e) => { setNewSavings({ ...newSavings, name: e.target.value }); setValidationErrors(v => { const n = {...v}; delete n['savings-name']; return n; }); }}
                      />
                    </div>
                    <div>
                      <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>Category</label>
                      <select className="input" value={newSavings.category} onChange={(e) => setNewSavings({ ...newSavings, category: e.target.value })}>
                        {savingsCategories.map(c => (<option key={c} value={c}>{c}</option>))}
                      </select>
                    </div>
                    <div>
                      <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>Target Amount *</label>
                      <input
                        type="number"
                        className={`input ${validationErrors['savings-target'] ? 'input-error' : ''}`}
                        placeholder="How much do you want to save?"
                        value={newSavings.targetAmount}
                        onChange={(e) => { setNewSavings({ ...newSavings, targetAmount: e.target.value === '' ? '' : parseFloat(e.target.value) || 0 }); setValidationErrors(v => { const n = {...v}; delete n['savings-target']; return n; }); }}
                      />
                    </div>
                    <div style={{ padding: isMobile ? '12px' : '16px', background: 'var(--glass)', borderRadius: '12px', border: '1px solid var(--border)' }}>
                      <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '12px', color: 'var(--text-secondary)' }}>Optional Details</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                        <div>
                          <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>Starting Amount</label>
                          <input type="number" className="input" placeholder="Already saved?" value={newSavings.currentAmount} onChange={(e) => setNewSavings({ ...newSavings, currentAmount: e.target.value === '' ? '' : parseFloat(e.target.value) || 0 })} />
                        </div>
                        <div>
                          <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>Monthly Auto-Save</label>
                          <input type="number" className="input" placeholder="Auto-add each month" value={newSavings.monthlyContribution} onChange={(e) => setNewSavings({ ...newSavings, monthlyContribution: e.target.value === '' ? '' : parseFloat(e.target.value) || 0 })} />
                        </div>
                        <div>
                          <label style={{ display: 'block', color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '8px', fontWeight: '500' }}>Priority (1 = most important to save for!)
</label>
                          <input type="number" className={`input ${validationErrors['savings-priority'] ? 'input-error' : ''}`} min="1" max="10" placeholder={`Next available: ${getNextAvailablePriority()}`} value={newSavings.priority === '' ? '' : newSavings.priority} onChange={(e) => { setNewSavings({ ...newSavings, priority: e.target.value === '' ? '' : (parseInt(e.target.value) || '') }); setValidationErrors(v => { const n = {...v}; delete n['savings-priority']; return n; }); }} />
                        </div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: '12px', marginTop: '8px' }}>
                      <button className="btn btn-primary" onClick={handleAddSavings} style={{ flex: 1, justifyContent: 'center' }}>
                        <Icons.Plus size={20} /> Add Goal
                      </button>
                      <button className="btn btn-secondary" onClick={() => { setShowAddSavingsModal(false); setValidationErrors({}); setNewSavings({ name: '', category: 'Emergency', targetAmount: '', currentAmount: '', monthlyContribution: '', priority: '', startDate: '' }); }} style={{ flex: 1, justifyContent: 'center' }}>
                        Cancel
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BillsTracker />);
  </script>
</body>
</html>
